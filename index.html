<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴모피즘 카운트다운</title>
    <style>
        :root {
            --bg-color: #F0F5F9;
            --text-color: #333333;
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
            --accent-color: #A8B8D0; /* 기본 파우더 블루 */
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Malgun Gothic', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh;
        }
        .header {
            width: 100%; max-width: 500px; text-align: center; margin-bottom: 30px;
        }
        input[type="text"], input[type="datetime-local"] {
            width: 90%; padding: 12px; margin: 8px 0; border: none;
            border-radius: 12px; background: var(--bg-color);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            outline: none; font-size: 16px; color: var(--text-color);
            text-align: center;
        }
        .dashboard {
            display: flex; justify-content: space-around; width: 100%; max-width: 500px;
            padding: 20px 0;
        }
        .bar-container {
            display: flex; flex-direction: column; align-items: center; width: 22%;
        }
        .bar-wrapper {
            width: 100%; max-width: 50px; height: 250px; border-radius: 25px;
            background: var(--bg-color); position: relative; overflow: hidden;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            margin-bottom: 15px;
        }
        .bar-fill {
            width: 100%; background-color: var(--accent-color);
            position: absolute; top: 0; height: 0%; /* 위에서 아래로 채워짐 */
            transition: background-color 0.3s ease;
        }
        .label { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .value { font-size: 13px; font-weight: bold; }
        .palette {
            display: flex; gap: 15px; margin-top: 40px; justify-content: center; flex-wrap: wrap;
        }
        .color-swatch {
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            transition: transform 0.2s;
        }
        .color-swatch:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="tabName" value="보세사 시험 준비" placeholder="타이머 이름">
        <input type="datetime-local" id="targetDate" onchange="updateTarget()">
    </div>

    <div class="dashboard">
        <div class="bar-container">
            <div class="label">일</div>
            <div class="bar-wrapper"><div class="bar-fill" id="fill-days"></div></div>
            <div class="value" id="val-days">0일</div>
        </div>
        <div class="bar-container">
            <div class="label">시간</div>
            <div class="bar-wrapper"><div class="bar-fill" id="fill-hours"></div></div>
            <div class="value" id="val-hours">0시간</div>
        </div>
        <div class="bar-container">
            <div class="label">분</div>
            <div class="bar-wrapper"><div class="bar-fill" id="fill-minutes"></div></div>
            <div class="value" id="val-minutes">0분</div>
        </div>
        <div class="bar-container">
            <div class="label">초</div>
            <div class="bar-wrapper"><div class="bar-fill" id="fill-seconds"></div></div>
            <div class="value" id="val-seconds">0.0초</div>
        </div>
    </div>

    <div class="palette">
        <div class="color-swatch" style="background-color: #C09891;" onclick="changeColor('#C09891')"></div>
        <div class="color-swatch" style="background-color: #9EAC8E;" onclick="changeColor('#9EAC8E')"></div>
        <div class="color-swatch" style="background-color: #D4AF37;" onclick="changeColor('#D4AF37')"></div>
        <div class="color-swatch" style="background-color: #A8B8D0;" onclick="changeColor('#A8B8D0')"></div>
        <div class="color-swatch" style="background-color: #B5A8B9;" onclick="changeColor('#B5A8B9')"></div>
        <div class="color-swatch" style="background-color: #FADCD0;" onclick="changeColor('#FADCD0')"></div>
    </div>

    <script>
        let targetTime = new Date().getTime() + (100 * 24 * 60 * 60 * 1000); // 기본 100일 후
        let initialTotalDays = 100;
        
        function updateTarget() {
            const inputVal = document.getElementById('targetDate').value;
            if(inputVal) {
                targetTime = new Date(inputVal).getTime();
                const now = new Date().getTime();
                initialTotalDays = (targetTime - now) / (1000 * 60 * 60 * 24);
                if(initialTotalDays <= 0) initialTotalDays = 1;
            }
        }

        function changeColor(color) {
            document.documentElement.style.setProperty('--accent-color', color);
        }

        function updateTimer() {
            const now = new Date().getTime();
            const difference = targetTime - now;

            if (difference <= 0) {
                requestAnimationFrame(updateTimer);
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
            const milliseconds = Math.floor(difference % 1000);

            document.getElementById('val-days').textContent = days + "일";
            document.getElementById('val-hours').textContent = hours + "시간";
            document.getElementById('val-minutes').textContent = minutes + "분";
            document.getElementById('val-seconds').textContent = seconds + "." + Math.floor(milliseconds/100) + "초";

            // 위에서 아래로 줄어드는 방식: 100%에서 남은 비율을 빼서 top 위치를 조정
            const secPercent = 100 - (((seconds + (milliseconds / 1000)) / 60) * 100);
            const minPercent = 100 - (((minutes + (seconds / 60)) / 60) * 100);
            const hrPercent = 100 - (((hours + (minutes / 60)) / 24) * 100);
            let dayPercent = 100 - ((days / initialTotalDays) * 100);
            if(dayPercent < 0) dayPercent = 0;

            document.getElementById('fill-seconds').style.height = (100 - secPercent) + '%';
            document.getElementById('fill-minutes').style.height = (100 - minPercent) + '%';
            document.getElementById('fill-hours').style.height = (100 - hrPercent) + '%';
            document.getElementById('fill-days').style.height = (100 - dayPercent) + '%';

            requestAnimationFrame(updateTimer);
        }
        
        requestAnimationFrame(updateTimer);
    </script>
</body>
</html>
