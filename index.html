<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴모피즘 다중 카운트다운</title>
    <style>
        /* 기본 테마 및 색상 변수 */
        :root {
            --bg-color: #F0F5F9;
            --text-color: #333333;
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
            --accent-color: #A8B8D0; 
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Malgun Gothic', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 10px; margin: 0; min-height: 100vh;
        }
        
        /* 1. 상단 탭 네비게이션 영역 */
        .nav-bar {
            display: flex; align-items: center; width: 100%; max-width: 500px;
            margin-bottom: 20px; gap: 10px;
        }
        .tab-list {
            display: flex; overflow-x: auto; gap: 10px; padding: 10px;
            flex-grow: 1; scrollbar-width: none; /* 파이어폭스 스크롤바 숨김 */
        }
        .tab-list::-webkit-scrollbar { display: none; } /* 크롬 스크롤바 숨김 */
        
        .tab {
            padding: 10px 15px; border-radius: 20px; font-weight: bold;
            font-size: 14px; cursor: pointer; white-space: nowrap;
            background: var(--bg-color); color: #777;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            transition: all 0.2s; border: none; outline: none;
        }
        .tab.active {
            color: var(--accent-color);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        }
        .add-tab-btn {
            width: 40px; height: 40px; border-radius: 50%; font-size: 20px;
            font-weight: bold; cursor: pointer; border: none; background: var(--bg-color);
            color: #555; display: flex; justify-content: center; align-items: center;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            flex-shrink: 0;
        }
        .add-tab-btn:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        }

        /* 2. 타이머 이름 및 날짜 입력 영역 */
        .header { width: 100%; max-width: 500px; text-align: center; margin-bottom: 30px; }
        input[type="text"], input[type="datetime-local"] {
            width: 90%; padding: 12px; margin: 8px 0; border: none;
            border-radius: 12px; background: var(--bg-color);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            outline: none; font-size: 16px; color: var(--text-color); text-align: center;
        }

        /* 3. 대시보드 (세로형 막대) */
        .dashboard {
            display: flex; justify-content: space-around; width: 100%; max-width: 500px;
            padding: 10px 0;
        }
        .bar-container { display: flex; flex-direction: column; align-items: center; width: 22%; }
        .bar-wrapper {
            width: 100%; max-width: 50px; height: 250px; border-radius: 25px;
            background: var(--bg-color); position: relative; overflow: hidden;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            margin-bottom: 15px;
        }
        .bar-fill {
            width: 100%; background-color: var(--accent-color);
            position: absolute; bottom: 0; height: 0%; /* 기준점을 바닥(bottom)으로 수정 완료 */
            transition: background-color 0.3s ease;
        }
        .label { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .value { font-size: 13px; font-weight: bold; }

        /* 4. 하단 저채도 컬러 팔레트 */
        .palette { display: flex; gap: 15px; margin-top: 30px; justify-content: center; flex-wrap: wrap; max-width: 500px;}
        .color-swatch {
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            transition: transform 0.2s;
        }
        .color-swatch:active { transform: scale(0.9); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="tab-list" id="tabList"></div>
        <button class="add-tab-btn" onclick="addTab()">+</button>
    </div>

    <div class="header">
        <input type="text" id="tabNameInput" placeholder="타이머 이름" oninput="updateTabName()">
        <input type="datetime-local" id="targetDateInput" onchange="updateTargetDate()">
    </div>

    <div class="dashboard">
        <div class="bar-container">
            <div class="label">일</div>
            <div class="bar-wrapper"><div class="bar-fill" id="fill-days"></div></div>
            <div class="value" id="val-days">0일</div>
        </div>
        <div class="bar-container">
            <div class="label">시간</div>
            <div class="bar-wrapper"><div class="bar-fill" id="fill-hours"></div></div>
            <div class="value" id="val-hours">0시간</div>
        </div>
        <div class="bar-container">
            <div class="label">분</div>
            <div class="bar-wrapper"><div class="bar-fill" id="fill-minutes"></div></div>
            <div class="value" id="val-minutes">0분</div>
        </div>
        <div class="bar-container">
            <div class="label">초</div>
            <div class="bar-wrapper"><div class="bar-fill" id="fill-seconds"></div></div>
            <div class="value" id="val-seconds">0.0초</div>
        </div>
    </div>

    <div class="palette">
        <div class="color-swatch" style="background-color: #C09891;" onclick="changeColor('#C09891')"></div>
        <div class="color-swatch" style="background-color: #9EAC8E;" onclick="changeColor('#9EAC8E')"></div>
        <div class="color-swatch" style="background-color: #D4AF37;" onclick="changeColor('#D4AF37')"></div>
        <div class="color-swatch" style="background-color: #A8B8D0;" onclick="changeColor('#A8B8D0')"></div>
        <div class="color-swatch" style="background-color: #B5A8B9;" onclick="changeColor('#B5A8B9')"></div>
        <div class="color-swatch" style="background-color: #FADCD0;" onclick="changeColor('#FADCD0')"></div>
    </div>

    <script>
        // 날짜 기본값 생성기 (현재 시간 + n일)
        function getDefaultDateStr(daysAdded) {
            const d = new Date();
            d.setDate(d.getDate() + daysAdded);
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); // 한국 시간대 맞춤
            return d.toISOString().slice(0, 16);
        }

        // 다중 탭 데이터를 담는 배열 (초기값 1개)
        let tabs = [
            {
                id: Date.now(),
                name: "그 날",
                dateStr: getDefaultDateStr(100),
                color: "#A8B8D0",
                initialDays: 100
            }
        ];
        let activeTabId = tabs[0].id;

        const tabListEl = document.getElementById('tabList');
        const nameInputEl = document.getElementById('tabNameInput');
        const dateInputEl = document.getElementById('targetDateInput');

        // 탭 버튼 화면에 그리기
        function renderTabs() {
            tabListEl.innerHTML = '';
            tabs.forEach(tab => {
                const btn = document.createElement('button');
                btn.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                btn.textContent = tab.name || "새 카운트다운";
                btn.onclick = () => switchTab(tab.id);
                tabListEl.appendChild(btn);
            });
        }

        // 특정 탭을 눌렀을 때 화면 전환
        function switchTab(id) {
            activeTabId = id;
            const activeTab = tabs.find(t => t.id === id);
            
            // 입력창과 색상을 해당 탭의 데이터로 교체
            nameInputEl.value = activeTab.name;
            dateInputEl.value = activeTab.dateStr;
            document.documentElement.style.setProperty('--accent-color', activeTab.color);
            
            renderTabs();
        }

        // '+' 버튼 눌러서 새 탭 추가
        function addTab() {
            const newId = Date.now();
            tabs.push({
                id: newId,
                name: "새 목표",
                dateStr: getDefaultDateStr(30), 
                color: "#9EAC8E", 
                initialDays: 30
            });
            switchTab(newId);
            setTimeout(() => { tabListEl.scrollLeft = tabListEl.scrollWidth; }, 50); // 스크롤 맨 끝으로
        }

        // 이름 입력 시 배열에 저장
        function updateTabName() {
            const activeTab = tabs.find(t => t.id === activeTabId);
            activeTab.name = nameInputEl.value;
            renderTabs(); 
        }

        // 날짜 변경 시 배열에 저장 및 기준일 재계산
        function updateTargetDate() {
            const activeTab = tabs.find(t => t.id === activeTabId);
            activeTab.dateStr = dateInputEl.value;
            
            if(activeTab.dateStr) {
                const targetTime = new Date(activeTab.dateStr).getTime();
                const now = new Date().getTime();
                activeTab.initialDays = (targetTime - now) / (1000 * 60 * 60 * 24);
                if(activeTab.initialDays <= 0) activeTab.initialDays = 1;
            }
        }

        // 팔레트 색상 클릭 시 배열에 저장
        function changeColor(colorHex) {
            const activeTab = tabs.find(t => t.id === activeTabId);
            activeTab.color = colorHex;
            document.documentElement.style.setProperty('--accent-color', colorHex);
            renderTabs(); 
        }

        // 실시간 타이머 계산 및 바닥(bottom) 기준 애니메이션 렌더링
        function updateTimer() {
            const activeTab = tabs.find(t => t.id === activeTabId);
            if (!activeTab || !activeTab.dateStr) {
                requestAnimationFrame(updateTimer);
                return;
            }

            const targetTime = new Date(activeTab.dateStr).getTime();
            const now = new Date().getTime();
            const difference = targetTime - now;

            // 목표 도달 시 0으로 고정
            if (difference <= 0) {
                document.getElementById('val-days').textContent = "0일";
                document.getElementById('val-hours').textContent = "0시간";
                document.getElementById('val-minutes').textContent = "0분";
                document.getElementById('val-seconds').textContent = "0.0초";
                ['days', 'hours', 'minutes', 'seconds'].forEach(unit => {
                    document.getElementById(`fill-${unit}`).style.height = '0%';
                });
                requestAnimationFrame(updateTimer);
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
            const milliseconds = Math.floor(difference % 1000);

            // 텍스트 출력
            document.getElementById('val-days').textContent = days + "일";
            document.getElementById('val-hours').textContent = hours + "시간";
            document.getElementById('val-minutes').textContent = minutes + "분";
            document.getElementById('val-seconds').textContent = seconds + "." + Math.floor(milliseconds/100) + "초";

            // CSS height(높이) 조절: 바닥(bottom: 0)에서부터 차있는 비율
            const secPercent = ((seconds + (milliseconds / 1000)) / 60) * 100;
            const minPercent = ((minutes + (seconds / 60)) / 60) * 100;
            const hrPercent = ((hours + (minutes / 60)) / 24) * 100;
            let dayPercent = (days / activeTab.initialDays) * 100;
            if(dayPercent > 100) dayPercent = 100;

            document.getElementById('fill-seconds').style.height = secPercent + '%';
            document.getElementById('fill-minutes').style.height = minPercent + '%';
            document.getElementById('fill-hours').style.height = hrPercent + '%';
            document.getElementById('fill-days').style.height = dayPercent + '%';

            // 프레임 반복 호출
            requestAnimationFrame(updateTimer);
        }
        
        // 앱 최초 실행
        renderTabs();
        switchTab(activeTabId);
        requestAnimationFrame(updateTimer);
    </script>
</body>
</html>
